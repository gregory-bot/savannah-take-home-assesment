name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=term-missing

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Render
        env:
          API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "🚀 Triggering deploy for service: ${SERVICE_ID}"
          
          http_code=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST \
            "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          
          echo "HTTP Status: $http_code"
          echo "Response:"
          cat /tmp/response.txt | python3 -m json.tool 2>/dev/null || cat /tmp/response.txt
          
          if [ "$http_code" = "200" ] || [ "$http_code" = "201" ] || [ "$http_code" = "202" ]; then
            echo "✅ Deploy triggered successfully! (HTTP $http_code)"
            exit 0
          elif [ "$http_code" = "401" ]; then
            echo "❌ Unauthorized - Check RENDER_API_KEY secret"
            exit 1
          elif [ "$http_code" = "404" ]; then
            echo "❌ Service not found - Check RENDER_SERVICE_ID secret"
            exit 1
          else
            echo "❌ Deploy failed with status: $http_code"
            exit 1
          fi