name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Render
        env:
          API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "Triggering deploy for service: ${SERVICE_ID}"
          
          # Write JSON to a temp file to avoid shell escaping issues
          printf '{"clearCache": false}' > /tmp/payload.json
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d @/tmp/payload.json)
          
          status_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          
          echo "HTTP Status: $status_code"
          
          if [ -n "$body" ]; then
            echo "Response:"
            echo "$body" | python3 -m json.tool 2>/dev/null || echo "$body"
          fi
          
          case "$status_code" in
            200|201)
              echo "✅ Deploy triggered successfully!"
              ;;
            401)
              echo "❌ Invalid API key. Update RENDER_API_KEY in GitHub secrets."
              exit 1
              ;;
            404)
              echo "❌ Service not found. Update RENDER_SERVICE_ID in GitHub secrets."
              echo "   Expected: srv-d97tottaeets73928cd0"
              exit 1
              ;;
            400)
              echo "❌ Bad request. Check service configuration on Render."
              exit 1
              ;;
            *)
              echo "❌ Failed with status: $status_code"
              exit 1
              ;;
          esac